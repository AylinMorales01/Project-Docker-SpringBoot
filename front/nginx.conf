server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # Proxy Inverso: Todo lo que vaya a /api lo manda al contenedor 'back'
    location /api/v1/users/ {
        proxy_pass http://back-container:9090/api/v1/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}